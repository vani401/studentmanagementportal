<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <title>Contact Us</title>

    <style>

        body{

            background:linear-gradient(to right,#eef2f3,#dfe9f3);

            font-family:Arial, Helvetica, sans-serif;
        }

        /* Contact Card */

        .contact-card{

            max-width:650px;

            margin:50px auto;

            border:none;

            border-radius:20px;

            overflow:hidden;

            background:white;

            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }

        /* Header */

        .contact-header{

            background:#0d6efd;

            color:white;

            padding:25px;

            text-align:center;
        }

        .contact-header h2{

            font-weight:bold;

            margin-bottom:5px;
        }

        .contact-header p{

            margin:0;

            opacity:0.9;
        }

        /* Form Section */

        .card-body{

            padding:30px;
        }

        label{

            font-weight:600;

            margin-bottom:6px;
        }

        .form-control{

            border-radius:12px;

            padding:12px;

            border:1px solid #ced4da;

            transition:0.3s;
        }

        .form-control:focus{

            border-color:#0d6efd;

            box-shadow:0 0 8px rgba(13,110,253,0.3);
        }

        textarea{

            resize:none;
        }

        /* Alert */

        .alert{

            border-radius:12px;
        }

        /* Buttons */

        .btn{

            border-radius:30px;

            padding:10px 25px;

            font-weight:500;

            transition:0.3s;
        }

        .btn:hover{

            transform:translateY(-3px);
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="card contact-card">

            <!-- Header -->

            <div class="contact-header">

                <h2>

                    Contact Us

                </h2>

                <p>

                    We would love to hear from you

                </p>

            </div>

            <div class="card-body">

                <!-- Alert -->

                <div class="alert alert-success alert-dismissible fade show"
                     role="alert">

                    Your message has been sent successfully!

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="alert">
                    </button>

                </div>

                <!-- Form -->

                <form>

                    <!-- Name -->

                    <div class="mb-3">

                        <label class="form-label">

                            Name

                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Enter your name">

                    </div>

                    <!-- Email -->

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input type="email"
                               class="form-control"
                               placeholder="Enter your email">

                    </div>

                    <!-- Subject -->

                    <div class="mb-3">

                        <label class="form-label">

                            Subject

                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Enter subject">

                    </div>

                    <!-- Message -->

                    <div class="mb-4">

                        <label class="form-label">

                            Message

                        </label>

                        <textarea class="form-control"
                                  rows="5"
                                  placeholder="Write your message"></textarea>

                    </div>

                    <!-- Buttons -->

                    <div class="text-center">

                        <button type="submit"
                                class="btn btn-primary me-2">

                            Send Message

                        </button>

                        <button type="reset"
                                class="btn btn-danger">

                            Reset

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
