<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Student Registration Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background-image:url("college.jpg");
      background-size:cover;
      background-repeat:no-repeat;
      background-position:center;
      background-attachment:fixed;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:30px 0;

      position:relative;
      overflow-x:hidden;
    }

    /* Dark Overlay */

    body::before{

      content:"";
      position:fixed;
      inset:0;

      background:rgba(0,0,0,0.5);

      z-index:-1;
    }

    /* Form Card */

    .registration-card{

      background:rgba(255,255,255,0.15);

      backdrop-filter:blur(12px);

      border-radius:20px;

      color:white;

      box-shadow:0 8px 20px rgba(0,0,0,0.4);

      padding:30px;

      max-height:95vh;

      overflow-y:auto;
    }

    /* Scrollbar */

    .registration-card::-webkit-scrollbar{

      width:6px;
    }

    .registration-card::-webkit-scrollbar-thumb{

      background:#0d6efd;
      border-radius:10px;
    }

    h2{

      color:#ffc107;

      font-weight:bold;
    }

    label{

      font-weight:600;
      margin-bottom:5px;
    }

    .form-control,
    .form-select{

      border-radius:10px;

      padding:12px;
    }

    .form-control:focus,
    .form-select:focus{

      border-color:#0d6efd;

      box-shadow:0 0 8px #0d6efd;
    }

    textarea{

      resize:none;
    }

    /* Buttons */

    .btn{

      border-radius:30px;

      padding:10px 30px;

      font-weight:600;

      transition:0.3s;
    }

    .btn:hover{

      transform:scale(1.05);
    }

    /* Responsive */

    @media(max-width:768px){

      .registration-card{

        padding:20px;
      }
    }

  </style>

</head>

<body>

  <div class="container py-4">

    <div class="row justify-content-center">

      <div class="col-lg-7 col-md-9">

        <div class="registration-card">

          <h2 class="text-center mb-4">
            Student Registration Form
          </h2>

          <form class="needs-validation" novalidate>

            <!-- Full Name -->

            <div class="mb-3">

              <label class="form-label">
                Full Name
              </label>

              <input type="text"
                     class="form-control"
                     placeholder="Enter Full Name"
                     required>

              <div class="invalid-feedback">
                Please enter full name
              </div>

            </div>

            <!-- Roll Number -->

            <div class="mb-3">

              <label class="form-label">
                Roll Number
              </label>

              <input type="text"
                     class="form-control"
                     placeholder="Enter Roll Number"
                     required>

            </div>

            <!-- Email -->

            <div class="mb-3">

              <label class="form-label">
                Email
              </label>

              <div class="input-group">

                <span class="input-group-text">
                  @
                </span>

                <input type="email"
                       class="form-control"
                       placeholder="Enter Email"
                       required>

              </div>

            </div>

            <!-- Mobile Number -->

            <div class="mb-3">

              <label class="form-label">
                Mobile Number
              </label>

              <input type="tel"
                     class="form-control"
                     pattern="[0-9]{10}"
                     placeholder="Enter Mobile Number"
                     required>

              <div class="invalid-feedback">
                Enter 10 digit mobile number
              </div>

            </div>

            <!-- Gender -->

            <div class="mb-3">

              <label class="form-label">
                Gender
              </label>

              <br>

              <div class="form-check form-check-inline">

                <input class="form-check-input"
                       type="radio"
                       name="gender"
                       required>

                <label class="form-check-label">
                  Male
                </label>

              </div>

              <div class="form-check form-check-inline">

                <input class="form-check-input"
                       type="radio"
                       name="gender">

                <label class="form-check-label">
                  Female
                </label>

              </div>

            </div>

            <!-- Branch -->

            <div class="mb-3">

              <label class="form-label">
                Branch
              </label>

              <select class="form-select" required>

                <option value="">
                  Select Branch
                </option>

                <option>CSE</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>MECH</option>

              </select>

            </div>

            <!-- Date of Birth -->

            <div class="mb-3">

              <label class="form-label">
                Date of Birth
              </label>

              <input type="date"
                     class="form-control"
                     required>

            </div>

            <!-- Address -->

            <div class="mb-3">

              <label class="form-label">
                Address
              </label>

              <textarea class="form-control"
                        rows="3"
                        placeholder="Enter Address"
                        required></textarea>

            </div>

            <!-- Upload Photo -->

            <div class="mb-3">

              <label class="form-label">
                Upload Photo
              </label>

              <input type="file"
                     class="form-control"
                     required>

            </div>

            <!-- Terms -->

            <div class="form-check mb-4">

              <input class="form-check-input"
                     type="checkbox"
                     required>

              <label class="form-check-label">
                I agree to Terms and Conditions
              </label>

            </div>

            <!-- Buttons -->

            <div class="text-center">

              <button type="submit"
                      class="btn btn-primary me-3">

                Submit

              </button>

              <button type="reset"
                      class="btn btn-secondary">

                Reset

              </button>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->

  
  <!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

  const form = document.querySelector("form");

  form.addEventListener("submit", function(e){

    e.preventDefault();

    if(!form.checkValidity()){

      form.classList.add("was-validated");
      return;

    }

    // Gender

    let gender = "";

    const genderInputs = document.querySelectorAll('input[name="gender"]');

    genderInputs.forEach((input,index)=>{

      if(input.checked){

        gender = index === 0 ? "Male" : "Female";

      }

    });

    // Student Object

    const student = {

      rollNo: document.querySelector('input[placeholder="Enter Roll Number"]').value,

      name: document.querySelector('input[placeholder="Enter Full Name"]').value,

      email: document.querySelector('input[type="email"]').value,

      mobile: document.querySelector('input[placeholder="Enter Mobile Number"]').value,

      gender: gender,

      branch: document.querySelector('select').value,

      dob: document.querySelector('input[type="date"]').value,

      address: document.querySelector('textarea').value,

      attendance: Math.floor(Math.random() * 30) + 70 + "%"

    };

    // Get Existing Students

    let students = JSON.parse(localStorage.getItem("students")) || [];

    // Add New Student

    students.push(student);

    // Save Back

    localStorage.setItem("students", JSON.stringify(students));

    alert("Student Registered Successfully!");

    // Reset Form

    form.reset();

    form.classList.remove("was-validated");

  });

</script>


</body>

</html>
